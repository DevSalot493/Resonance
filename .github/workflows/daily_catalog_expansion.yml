name: Daily Catalog Expansion

on:
  schedule:
    - cron: '0 6 * * *'   # 6 AM UTC daily
  workflow_dispatch:
    inputs:
      max_total:
        description: 'Max new artists to add this run'
        required: false
        default: '200'

jobs:
  expand:
    runs-on: ubuntu-latest

    # Requires repository secrets pointing at a REAL, internet-accessible
    # PostgreSQL instance — GitHub Actions cannot reach a database running
    # on your local machine. See README for setup instructions if you want
    # this workflow to actually run rather than just document the pattern.
    env:
      DATABASE_URL:      ${{ secrets.DATABASE_URL }}
      LASTFM_API_KEY:    ${{ secrets.LASTFM_API_KEY }}
      LASTFM_API_SECRET: ${{ secrets.LASTFM_API_SECRET }}
      MB_USER_AGENT:     ${{ secrets.MB_USER_AGENT }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run catalog expansion
        run: |
          python -m ingestion.expand_catalog --max-total ${{ github.event.inputs.max_total || 200 }}